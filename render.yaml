services:
  - type: web
    name: yt-downloader
    env: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
      pip install yt-dlp --upgrade
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
