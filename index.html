<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YouTube Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#f2f2f2;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2.5rem 1rem 4rem}
.wrap{width:100%;max-width:660px}
.card{background:#fff;border-radius:18px;padding:26px 26px 22px;box-shadow:0 2px 20px rgba(0,0,0,.07);margin-bottom:14px}
.hdr{display:flex;align-items:center;gap:13px;margin-bottom:22px}
.logo{width:46px;height:46px;background:#FF0000;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:27px;height:27px;fill:#fff}
.htxt h1{font-size:21px;font-weight:700;color:#111}
.htxt p{font-size:13px;color:#999;margin-top:2px}
.irow{display:flex;gap:8px}
.url-inp{flex:1;padding:13px 15px;border:1.5px solid #e0e0e0;border-radius:11px;font-size:14px;font-family:inherit;color:#111;outline:none;transition:border-color .2s,box-shadow .2s}
.url-inp:focus{border-color:#FF0000;box-shadow:0 0 0 3px rgba(255,0,0,.11)}
.url-inp::placeholder{color:#bbb}
.fetch-btn{padding:13px 22px;background:#FF0000;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .2s,transform .1s}
.fetch-btn:hover{background:#c00}
.fetch-btn:active{transform:scale(.97)}
.fetch-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}
.sbar{display:none;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;font-size:13px;margin-top:12px;border:1px solid #eee;background:#fafafa;color:#888}
.sbar.show{display:flex}
.spin{width:16px;height:16px;border:2.5px solid #eee;border-top-color:#FF0000;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.err{display:none;padding:11px 14px;border-radius:10px;background:#fff3f3;border:1px solid #ffd0d0;color:#c00;font-size:13px;margin-top:12px;line-height:1.5}
.err.show{display:block}
.vcard{display:none;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.07)}
.vcard.show{display:block}
.tbox{position:relative;background:#000}
.tbox img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2)}
.play-circle{width:62px;height:62px;background:rgba(255,0,0,.92);border-radius:50%;display:flex;align-items:center;justify-content:center}
.play-circle svg{width:25px;height:25px;fill:#fff;margin-left:5px}
.vmeta{padding:20px 22px}
.vtitle{font-size:16px;font-weight:700;color:#111;margin-bottom:8px;line-height:1.45}
.mrow{display:flex;flex-wrap:wrap;gap:4px 14px;margin-bottom:18px}
.mitem{font-size:12px;color:#999}
.flabel{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.fbtn{padding:11px 8px;border:1.5px solid #e8e8e8;border-radius:11px;background:#fafafa;font-size:13px;font-family:inherit;cursor:pointer;text-align:center;color:#333;transition:all .15s;line-height:1.2}
.fbtn strong{display:block;font-weight:700;font-size:14px}
.fbtn small{font-size:11px;color:#aaa;display:block;margin-top:3px}
.fbtn:hover{border-color:#FF0000;color:#FF0000;background:rgba(255,0,0,.04)}
.fbtn.sel{border-color:#FF0000;background:rgba(255,0,0,.06);color:#c00}
.fbtn.sel small{color:rgba(200,0,0,.5)}
.dl-btn{width:100%;padding:14px;background:#FF0000;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s,transform .1s}
.dl-btn:hover{background:#c00}
.dl-btn:active{transform:scale(.98)}
.dl-btn:disabled{background:#bbb;cursor:not-allowed;transform:none}
.dl-btn svg{width:19px;height:19px;fill:#fff}
.prog-section{display:none;margin-top:16px;padding:16px 18px;border-radius:13px;border:1.5px solid #ffe0e0;background:#fff8f8}
.prog-section.show{display:block}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-label{font-size:14px;font-weight:600;color:#222}
.prog-pct{font-size:22px;font-weight:700;color:#FF0000;min-width:52px;text-align:right}
.prog-bar-bg{width:100%;height:10px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin-bottom:8px}
.prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#FF0000,#ff6b6b);border-radius:99px;transition:width .4s ease}
.prog-bar.done{background:linear-gradient(90deg,#22c55e,#4ade80)}
.prog-info{font-size:12px;color:#999;min-height:16px}
.prog-steps{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.step{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#f0f0f0;color:#aaa;transition:all .3s}
.step.active{background:#fff0f0;color:#FF0000;border:1px solid #ffccc7}
.step.done-step{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.success-box{display:none;margin-top:12px;padding:14px 16px;border-radius:11px;background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;font-size:14px;font-weight:600;align-items:center;gap:10px}
.success-box.show{display:flex}
.success-box svg{width:20px;height:20px;fill:#22c55e;flex-shrink:0}
.note{font-size:12px;color:#bbb;text-align:center;margin-top:14px;line-height:1.7}
@media(max-width:480px){.irow{flex-direction:column}.fetch-btn{width:100%}.fgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.38.55A3.02 3.02 0 00.5 6.19C0 8.05 0 12 0 12s0 3.95.5 5.81a3.02 3.02 0 002.12 2.14C4.46 20.5 12 20.5 12 20.5s7.54 0 9.38-.55a3.02 3.02 0 002.12-2.14C24 15.95 24 12 24 12s0-3.95-.5-5.81zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>
      </div>
      <div class="htxt">
        <h1>YouTube Downloader</h1>
        <p>Video ya MP3 — seedha download karein</p>
      </div>
    </div>
    <div class="irow">
      <input class="url-inp" id="urlInp" type="text" placeholder="https://www.youtube.com/watch?v=..."/>
      <button class="fetch-btn" id="fetchBtn" onclick="doFetch()">Fetch Video</button>
    </div>
    <div class="sbar" id="sbar"><div class="spin"></div><span id="stxt">Video info le raha hai...</span></div>
    <div class="err" id="err"></div>
  </div>

  <div class="vcard" id="vcard">
    <div class="tbox">
      <img id="thumb" src="" alt="thumbnail"/>
      <div class="play-ov"><div class="play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
    </div>
    <div class="vmeta">
      <div class="vtitle" id="vtitle">—</div>
      <div class="mrow">
        <span class="mitem" id="mchan"></span>
        <span class="mitem" id="mdur"></span>
        <span class="mitem" id="mviews"></span>
      </div>
      <div class="flabel">Format Chunein</div>
      <div class="fgrid" id="fgrid"></div>
      <button class="dl-btn" id="dlBtn" onclick="doDownload()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Download Karein
      </button>
      <div class="prog-section" id="progSection">
        <div class="prog-header">
          <span class="prog-label" id="progLabel">Download ho rahi hai...</span>
          <span class="prog-pct" id="progPct">0%</span>
        </div>
        <div class="prog-bar-bg"><div class="prog-bar" id="progBar"></div></div>
        <div class="prog-info" id="progInfo"></div>
        <div class="prog-steps">
          <span class="step" id="step1">📥 Download</span>
          <span class="step" id="step2">🔗 Merge</span>
          <span class="step" id="step3">✅ Tayar</span>
        </div>
      </div>
      <div class="success-box" id="successBox">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Download complete! File aapke PC mein save ho gayi.
      </div>
    </div>
  </div>
  <div class="note">Personal use ke liye. Aapka data safe hai.</div>
</div>

<script>
// ============================================================
//  YEH LINE CHANGE KAREIN APNI RAILWAY URL SE
// ============================================================
const API = 'https://YOUR-APP.up.railway.app';
// ============================================================

let selFmt=null, allFormats=[], currentUrl='', pollTimer=null;

function showStatus(t){document.getElementById('sbar').classList.add('show');document.getElementById('stxt').textContent=t}
function hideStatus(){document.getElementById('sbar').classList.remove('show')}
function showErr(t){const e=document.getElementById('err');e.innerHTML=t;e.classList.add('show')}
function hideErr(){document.getElementById('err').classList.remove('show')}

function renderFmts(formats){
  allFormats=formats;
  const g=document.getElementById('fgrid');g.innerHTML='';
  formats.forEach(f=>{
    const b=document.createElement('button');
    b.className='fbtn'+(selFmt===f.format_id?' sel':'');
    b.innerHTML=`<strong>${f.label}</strong><small>${f.type==='audio'?'Audio Only':'MP4 Video'}</small>`;
    b.onclick=()=>{selFmt=f.format_id;renderFmts(formats)};
    g.appendChild(b);
  });
}

async function doFetch(){
  const url=document.getElementById('urlInp').value.trim();
  if(!url){showErr('YouTube link paste karein.');return}
  if(!url.includes('youtube.com')&&!url.includes('youtu.be')){showErr('Sahi YouTube URL nahi hai.');return}
  currentUrl=url; hideErr();
  document.getElementById('vcard').classList.remove('show');
  document.getElementById('successBox').classList.remove('show');
  document.getElementById('progSection').classList.remove('show');
  document.getElementById('fetchBtn').disabled=true;
  showStatus('Video info le raha hai...');
  try{
    const res=await fetch(`${API}/info?url=${encodeURIComponent(url)}`);
    const d=await res.json(); hideStatus();
    if(d.error){showErr('❌ '+d.error);return}
    document.getElementById('thumb').src=d.thumbnail||`https://img.youtube.com/vi/${d.video_id}/hqdefault.jpg`;
    document.getElementById('vtitle').textContent=d.title;
    document.getElementById('mchan').textContent=d.channel;
    document.getElementById('mdur').textContent=d.duration;
    document.getElementById('mviews').textContent=d.views?Number(d.views).toLocaleString()+' views':'';
    selFmt=d.formats.length?d.formats[0].format_id:null;
    renderFmts(d.formats);
    document.getElementById('vcard').classList.add('show');
  }catch(e){
    hideStatus();
    showErr('❌ Server se connect nahi hua.<br><small>Railway backend deploy hai?</small>');
  }finally{document.getElementById('fetchBtn').disabled=false}
}

function setStep(n){
  ['step1','step2','step3'].forEach((id,i)=>{
    document.getElementById(id).className='step'+(i<n-1?' done-step':i===n-1?' active':'');
  });
}

function updateProgress(d){
  const pct=d.percent||0;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progInfo').textContent=d.info||'';
  if(d.status==='downloading'){document.getElementById('progLabel').textContent='Download ho rahi hai...';document.getElementById('progBar').classList.remove('done');setStep(1)}
  else if(d.status==='merging'){document.getElementById('progLabel').textContent='Video + Audio merge ho rahi hai...';setStep(2)}
  else if(d.status==='converting'){document.getElementById('progLabel').textContent='MP3 convert ho raha hai...';setStep(2)}
  else if(d.status==='done'){document.getElementById('progLabel').textContent='Complete!';document.getElementById('progPct').textContent='100%';document.getElementById('progBar').style.width='100%';document.getElementById('progBar').classList.add('done');setStep(3)}
}

function resetBtn(){
  const b=document.getElementById('dlBtn');
  b.disabled=false;
  b.innerHTML=`<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Download Karein`;
}

async function pollProgress(jobId){
  try{
    const res=await fetch(`${API}/progress/${jobId}`);
    const d=await res.json();
    updateProgress(d);
    if(d.status==='error'){clearInterval(pollTimer);document.getElementById('progSection').classList.remove('show');showErr('❌ '+(d.error||'Download fail.'));resetBtn();return}
    if(d.status==='done'){
      clearInterval(pollTimer);
      setTimeout(()=>{
        const a=document.createElement('a');a.href=`${API}/get_file/${jobId}`;a.click();
        document.getElementById('successBox').classList.add('show');resetBtn();
      },500);
    }
  }catch(e){}
}

async function doDownload(){
  if(!selFmt||!currentUrl){showErr('Pehle video fetch karein.');return}
  hideErr();
  const fmt=allFormats.find(f=>f.format_id===selFmt);
  const isAudio=fmt&&fmt.type==='audio';
  const btn=document.getElementById('dlBtn');
  btn.disabled=true;
  btn.innerHTML=`<div class="spin" style="border-top-color:#fff;border-color:rgba(255,255,255,.3)"></div> Shuru ho raha hai...`;
  document.getElementById('successBox').classList.remove('show');
  document.getElementById('progSection').classList.add('show');
  document.getElementById('progBar').style.width='0%';
  document.getElementById('progBar').classList.remove('done');
  document.getElementById('progPct').textContent='0%';
  document.getElementById('progInfo').textContent='';
  setStep(1);
  try{
    const params=new URLSearchParams({url:currentUrl,format:selFmt,audio:isAudio?'true':'false'});
    const res=await fetch(`${API}/start_download?${params}`);
    const d=await res.json();
    if(d.error){showErr('❌ '+d.error);resetBtn();return}
    btn.innerHTML=`<div class="spin" style="border-top-color:#fff;border-color:rgba(255,255,255,.3)"></div> Downloading...`;
    if(pollTimer) clearInterval(pollTimer);
    pollTimer=setInterval(()=>pollProgress(d.job_id),700);
  }catch(e){showErr('❌ Server connect nahi hua.');resetBtn()}
}

document.getElementById('urlInp').addEventListener('keydown',e=>{if(e.key==='Enter')doFetch()});
</script>
</body>
</html>
